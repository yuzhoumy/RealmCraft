1:
  title: 野外基地是什麽？如何設置野外基地？
  description:
    - 野外基地是由政府研究團隊開發的。在野外你可以隨意設置傳送門，進入傳送門過後就是一個寬闊的空間。這對需要經常待在野外的玩家很有用。
    - 野外基地的傳送門是有血量的，每當玩家破壞守護石（傳送門上面的方塊）就會扣血。傳送門管理員必須經常為傳送門補血。如果傳送門的血量被打至0時，敵人將可以自由進出你的基地！如果傳送門的血量維持24小時是0，那麽傳送門以及基地將會被系統自動銷毀。
    - 創建一個傳送門需要$100000。輸入 /porman new <基地名字> 即可創建。你可以點擊傳送門的熒光石方塊打開傳送門管理界面，在那裏你可以為傳送門補血、升級傳送門守護石。
    - 你可以輸入 /porman addmember <基地名字> <玩家名字> 將你的朋友加入成員名單，這樣他就可以進入該基地了。如果要讓玩家獲得傳送門管理員權限（可以打開傳送門管理界面）輸入 /porman addadmin <基地名字> <玩家名字>
    - 更多關於傳送門系統的指令，輸入 /porman 查看。